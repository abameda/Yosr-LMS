# Generated with Supabase CLI 2.106.0. Configuration reference:
# https://supabase.com/docs/guides/local-development/cli/config
project_id = "lms"

[api]
# Keep the gateway port for Auth, but do not start PostgREST or expose the
# browser-facing Data API and GraphQL endpoint in the Stage 0/1 foundation.
enabled = false
port = 55321

[db]
port = 55322
shadow_port = 55320
major_version = 17

[db.pooler]
enabled = true
port = 55329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false
sql_paths = []

[realtime]
enabled = false

[studio]
enabled = false

# Supabase CLI currently names this section "inbucket"; the service is Mailpit.
[inbucket]
enabled = true
port = 55324

[storage]
enabled = false

[storage.s3_protocol]
enabled = false

[storage.analytics]
enabled = false

[storage.vector]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.mfa.totp]
enroll_enabled = false
verify_enabled = false

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[auth.oauth_server]
enabled = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
